# Synapse local security rules (used when no platform API key is set).
# Schema mirrors Synapse's security_rules_example.yaml — all top-level sections
# (access_rules, amygdala_rules, waf_rules, content_scanning, timestamps) must
# be present or the file fails to parse and the WAF stays disabled.
#
# Passed via: --security-rules-config deploy/synapse/security_rules.yaml
#
# Note: behind an ngrok HTTP tunnel every request arrives from the local agent,
# so ip.src / threat-intel fields see 127.0.0.1 and aren't useful here. The
# content/method/path rules below do the work; the API's bearer token remains
# the primary access control. Rate-limiting needs the platform API, so it's not
# included in local mode.

access_rules:
  id: "local-rules"
  name: "claude-remote access rules"
  description: "Static access rules"
  allow:
    ips:
      - "127.0.0.1"
      - "::1"
    country: []
    asn: []
  block:
    ips: []
    country: []
    asn: []

amygdala_rules:
  block: []
  allow: []

waf_rules:
  rules:
    - id: "waf-sqli"
      name: "Block SQL injection"
      org_id: "local"
      description: "Common SQLi markers in body/query"
      action: "block"
      expression: 'http.request.body contains "DROP TABLE" or http.request.body contains "UNION SELECT" or http.request.query contains "1=1"'

    - id: "waf-xss"
      name: "Block XSS"
      org_id: "local"
      description: "Inline <script> in body/query"
      action: "block"
      expression: 'http.request.body contains "<script>" or http.request.query contains "<script>"'

    - id: "waf-traversal"
      name: "Block path traversal / dotfiles"
      org_id: "local"
      description: "Block ../ traversal and hidden/.env/.git probes"
      action: "block"
      expression: 'http.request.path contains "/.." or http.request.path contains "/.env" or http.request.path contains "/.git"'

    - id: "waf-large-post"
      name: "Block oversized POST"
      org_id: "local"
      description: "Reject POST bodies larger than 1MB (the API takes tiny JSON)"
      action: "block"
      expression: 'http.request.method eq "POST" and http.request.content_length > 1048576'

    - id: "waf-methods"
      name: "Allow only the methods the API uses"
      org_id: "local"
      description: "Block anything that isn't GET/POST/DELETE/OPTIONS/HEAD"
      action: "block"
      expression: 'not (http.request.method eq "GET" or http.request.method eq "POST" or http.request.method eq "DELETE" or http.request.method eq "OPTIONS" or http.request.method eq "HEAD")'

content_scanning:
  enabled: false
  clamav_server: "localhost:3310"
  max_file_size: 10485760
  scan_content_types:
    - "application/json"
  skip_extensions: []
  scan_expression: 'http.request.method eq "POST" or http.request.method eq "PUT"'

