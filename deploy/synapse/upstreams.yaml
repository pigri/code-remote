# Synapse upstreams — v1/legacy schema (no `version:` field). This is the
# schema the HTTP proxy actually routes by. The API backend is plain HTTP
# (ssl_enabled: false); ngrok already terminated TLS at the edge, so no per-host
# `tls:` block is needed (the v2 schema would require one).
upstreams:
  your-domain.ngrok.dev:
    paths:
      "/":
        servers:
          - "127.0.0.1:9000"
        ssl_enabled: false
